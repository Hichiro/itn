services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./wg-client:/config
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network
    ports:
      - "51820:51820/udp"

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    environment:
      - HOST=0.0.0.0
      - PORT=20128
      - OMNIROUTE_PUBLIC_BASE_URL=https://e2m.my.to
      - TRUST_PROXY=true
    volumes:
      - omniroute-data:/app/data
    ports:
      - "20128"
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - omniroute
    ports:
      - "80:80"
      - "443:443"
      - "20128:20128"
      - "18800:18800"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network

  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools

networks:
  home-network:
    driver: bridge

volumes:
  omniroute-data:
  lazydocker-config:
  caddy_data:
  caddy_config:
