services:
  picoclaw:
    image: sipeed/picoclaw:launcher
    container_name: picoclaw
    restart: unless-stopped
    command: -public -console -lang en -port 18800 -no-browser
    expose:
      - "18800"
    volumes:
      - ./.picoclaw:/root/.picoclaw
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    oom_score_adj: -800
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 40M
    networks:
      - home-network

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    privileged: true
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./wg-client:/config
    restart: unless-stopped
    oom_score_adj: -200
    deploy:
      resources:
        limits:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    environment:
      - HOST=0.0.0.0
      - PORT=20128
      - OMNIROUTE_PUBLIC_BASE_URL=https://e2m.my.to
      - TRUST_PROXY=true
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:20128/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - omniroute-data:/app/data
    oom_score_adj: -600
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - home-network
    expose:
      - "20128"
    dns:
      - 1.1.1.1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - omniroute
    ports:
      - "80:80"
      - "443:443"
      - "20128:20128"
      - "18800:18800"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    command: sh -c "caddy fmt --overwrite /etc/caddy/Caddyfile && exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    oom_score_adj: -200
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network

  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools
    oom_score_adj: 200
    deploy:
      resources:
        limits:
          memory: 60M
    networks:
      - home-network

networks:
  home-network:
    driver: bridge

volumes:
  omniroute-data:
  lazydocker-config:
  caddy_data:
  caddy_config:
