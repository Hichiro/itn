services:
  picoclaw:
    image: sipeed/picoclaw:latest
    container_name: picoclaw
    restart: unless-stopped
    ports:
      - "18800:18800"
    volumes:
      - ~/.picoclaw:/root/.picoclaw
    depends_on:
      - python
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 40M

  python:
    image: python:3.11-alpine
    container_name: python
    restart: unless-stopped
    working_dir: /app
    command: sh -c "apk add --no-cache py3-pip && python main.py"
    volumes:
      - ./python-tools:/app
    expose:
      - "8008"
    deploy:
      resources:
        limits:
          memory: 120M
        reservations:
          memory: 60M

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./wg-client:/config
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - home-network
    ports:
      - "51820:51820/udp"
    deploy:
      resources:
        limits:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    environment:
      - HOST=0.0.0.0
      - PORT=20128
      - OMNIROUTE_PUBLIC_BASE_URL=https://e2m.my.to
      - TRUST_PROXY=true
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:20128/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - omniroute-data:/app/data
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - home-network
    ports:
      - "20128"
    dns:
      - 1.1.1.1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - omniroute
    ports:
      - "80:80"
      - "443:443"
      - "20128:20128"
      - "18800:18800"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network

  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools
    deploy:
      resources:
        limits:
          memory: 60M

networks:
  home-network:
    driver: bridge

volumes:
  omniroute-data:
  lazydocker-config:
  caddy_data:
  caddy_config:
