services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    ports:
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      - PUID=1000
      - PGID=1000
      - PEERS=3
      - SERVERPORT=51820
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./wireguard:/config
    restart: unless-stopped
    oom_score_adj: -200
    deploy:
      resources:
        limits:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command: sh -c "caddy fmt --overwrite /etc/caddy/Caddyfile && exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    oom_score_adj: -200
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  9router:
    image: decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    depends_on:
      - wireguard
    network_mode: service:wireguard
    environment:
      - DATA_DIR=/app/data
      - HOST=0.0.0.0
      - PORT=20128
      - NODE_ENV=production
      - REQUIRE_API_KEY=true
      - AUTH_COOKIE_SECURE=true
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./.9router:/app/data
    oom_score_adj: -600
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  picoclaw:
    image: sipeed/picoclaw:launcher
    container_name: picoclaw
    restart: unless-stopped
    command: -public -console -lang en -port 18800 -no-browser
    network_mode: service:wireguard
    volumes:
      - ./.picoclaw:/root/.picoclaw
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - TZ=Asia/Ho_Chi_Minh
    oom_score_adj: -800
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 40M

  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools
    oom_score_adj: 200
    deploy:
      resources:
        limits:
          memory: 60M

volumes:
  lazydocker-config:
  caddy_data:
  caddy_config:
