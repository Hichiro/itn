services:
  # Ứng dụng chính chạy 24/7
  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    ports:
      - "20128:20128"
    volumes:
      - omniroute-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Công cụ quản lý (Chỉ bật khi bạn gọi)
  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools

# Khai báo tất cả Named Volumes ở cuối file
volumes:
  omniroute-data:
  lazydocker-config:
