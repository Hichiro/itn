services:
  picoclaw:
    image: sipeed/picoclaw:launcher
    container_name: picoclaw
    restart: unless-stopped
    command: -public -console -lang en -port 18800 -no-browser
    expose:
      - "18800"
    volumes:
      - ./.picoclaw:/root/.picoclaw
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    oom_score_adj: -800
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 40M
    networks:
      - home-network

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./wg-client:/config
    restart: unless-stopped
    oom_score_adj: -200
    deploy:
      resources:
        limits:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network

  9router:
    image: decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data
      - HOST=0.0.0.0
      - PORT=20128
      - NODE_ENV=production
    expose:
      - "18800"
    volumes:
      - ./.9router:/app/data
    oom_score_adj: -600
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network
        
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "20128:20128"
      - "18800:18800"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    command: sh -c "caddy fmt --overwrite /etc/caddy/Caddyfile && exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    oom_score_adj: -200
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - home-network

  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools
    oom_score_adj: 200
    deploy:
      resources:
        limits:
          memory: 60M
    networks:
      - home-network

networks:
  home-network:
    driver: bridge

volumes:
  lazydocker-config:
  caddy_data:
  caddy_config:
