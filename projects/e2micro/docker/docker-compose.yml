services:
  # 1. WireGuard Client (Đóng vai trò là cổng mạng chính)
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - PID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./wg-client:/config
    ports:
      - "20128:20128"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 2. Ứng dụng OmniRoute
  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    network_mode: "service:wireguard"
    # (Bỏ phần ports: "20128:20128" ở đây vì đã chuyển sang dịch vụ wireguard ở trên)
    environment:
      # Thay bằng IP WireGuard mà Router ở nhà cấp cho máy ảo GCP
      - OMNIROUTE_PUBLIC_BASE_URL=http://10.6.0.3:20128
    volumes:
      - omniroute-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Lazydocker
  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools

volumes:
  omniroute-data:
  lazydocker-config:
