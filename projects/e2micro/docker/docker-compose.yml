services:

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./wg-client:/config
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    stop_grace_period: 40s
    environment:
      - OMNIROUTE_PUBLIC_BASE_URL=http://e2m.my.to
    volumes:
      - omniroute-data:/app/data
    ports:
      - "20128:20128"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cf-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cf-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - omniroute
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  lazydocker:
    image: lazyteam/lazydocker:latest
    container_name: lazydocker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - lazydocker-config:/.config/jesseduffield/lazydocker
    profiles:
      - tools

volumes:
  omniroute-data:
  lazydocker-config:
