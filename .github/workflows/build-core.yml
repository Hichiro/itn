name: 1. Build PicoClaw Core
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Core with Manual Docker SDK
        run: |
          mkdir -p bin/
          # Chạy Docker với biến môi trường TERM=xterm để tránh lỗi terminal
          docker run --rm \
            -e TERM=xterm \
            -v ${{ github.workspace }}/packages:/home/build/openwrt/package/custom \
            -v ${{ github.workspace }}/bin:/home/build/openwrt/bin \
            openwrt/sdk:mipsel_74kc-23.05.3 \
            sh -c "
              # Cập nhật feed
              ./scripts/feeds update -a && ./scripts/feeds install -a
              
              # TẠO CẤU HÌNH MẶC ĐỊNH (Quan trọng nhất để tránh lỗi menuconfig)
              make defconfig
              
              # Chỉ định biên dịch riêng gói picoclaw
              make package/custom/core/compile V=s
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-apk
          path: bin/**/*.apk
