name: 1. Build PicoClaw Core
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Core with Manual Docker SDK
        run: |
          # 1. Tạo thư mục chứa kết quả
          mkdir -p bin/
          
          # 2. Chạy Docker SDK chính thức của OpenWrt
          # Chúng ta map thư mục 'packages' vào trong Docker
          docker run --rm \
            -v ${{ github.workspace }}/packages:/home/build/openwrt/package/custom \
            -v ${{ github.workspace }}/bin:/home/build/openwrt/bin \
            openwrt/sdk:mipsel_74kc-23.05.3 \
            sh -c "
              ./scripts/feeds update -a && ./scripts/feeds install -a
              make package/custom/core/compile V=s
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-apk
          # Quét sâu để tìm file apk vừa build
          path: bin/**/*.apk
