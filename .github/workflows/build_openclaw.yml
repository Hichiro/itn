name: Auto Build OpenClaw for e2-micro

on:
  schedule:
    - cron: '0 19 * * 5' # 02:00 sáng Thứ Bảy (Giờ VN)
  workflow_dispatch:     # Cho phép chạy thủ công

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new stable tags
        id: check_upstream
        run: |
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/openclaw/openclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)
          [ -z "$UPSTREAM_TAG" ] && UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/openclaw/openclaw.git | awk -F'/' '{print $3}' | grep -vE '(alpha|beta|rc|nightly|\^)' | tail -n 1)
          
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/openclaw/openclaw.git refs/tags/$UPSTREAM_TAG | grep -v '\^{}' | awk '{print $1}')
          LOCAL_COMMIT=$(cat projects/openclaw/last_build_commit.txt 2>/dev/null || echo "")
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            mkdir -p projects/openclaw
            echo "$UPSTREAM_COMMIT" > projects/openclaw/last_build_commit.txt
          fi

      - name: Clone source code
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch --depth 1 \
            https://github.com/openclaw/openclaw.git source-code

      - name: Setup Node.js Environment
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build OpenClaw Core and UI
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          corepack enable
          
          # XOÁ CÁC GÓI AI LOCAL NẶNG ĐỂ TRÁNH TRÀN RAM MÁY ẢO E2-MICRO
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (pkg.dependencies) {
              delete pkg.dependencies['node-llama-cpp'];
              delete pkg.dependencies['@node-llama-cpp/linux-x64'];
              delete pkg.dependencies['@node-llama-cpp/linux-x64-cuda'];
              delete pkg.dependencies['@node-llama-cpp/linux-x64-cuda-ext'];
              delete pkg.dependencies['@node-llama-cpp/linux-x64-vulkan'];
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          pnpm install
          pnpm build
          pnpm ui:build
          
          # Đóng gói LOẠI BỎ node_modules và các thư mục cache nặng
          tar -czf ../openclaw-release.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.cache' \
            .
          
          cd ..
          ls -lh openclaw-release.tar.gz

      - name: Commit build release
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main || git checkout -b main
          git reset --hard origin/main

          mkdir -p projects/openclaw/history

          if [ -f "projects/openclaw/openclaw-release.tar.gz" ]; then
            OLD_TAG=$(cat projects/openclaw/last_build_commit.txt 2>/dev/null | head -c 8 || echo "old")
            mv projects/openclaw/openclaw-release.tar.gz projects/openclaw/history/openclaw-release-$OLD_TAG.tar.gz 2>/dev/null || true
          fi

          echo "${{ steps.check_upstream.outputs.tag_name }}" > projects/openclaw/last_build_version.txt
          cp openclaw-release.tar.gz projects/openclaw/openclaw-release.tar.gz

          git add projects/
          git commit -m "Automated Release OpenClaw Build ${{ steps.check_upstream.outputs.tag_name }} [skip ci]" || echo "No changes"
          
          git pull --rebase origin main
          git push origin main
