name: Auto Build PicoClaw WebUI for Termux

on:
  schedule:
    - cron: '0 19 * * 5' # Chạy vào 19:00 thứ 6 hàng tuần
  workflow_dispatch: # Cho phép chạy thủ công

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Check for new stable tags from upstream
        id: check_upstream
        run: |
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+.[0-9]+.[0-9]+$' | tail -n 1)
          
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Loi: Khong xac dinh duoc Tag tu sipeed/picoclaw."
            exit 1
          fi
          
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/sipeed/picoclaw.git refs/tags/$UPSTREAM_TAG | grep -v '^{}' | awk '{print $1}')
          LOCAL_COMMIT=$(cat picoclaw/last_build_commit.txt 2>/dev/null || echo "")
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "No new updates. Skipping build."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "New stable update found!"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "commit_hash=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          fi

      - name: Clone PicoClaw Source
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch https://github.com/sipeed/picoclaw.git source-code

      - name: Setup Node.js & pnpm
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Go
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: source-code/go.sum

      - name: Fix Missing Embed Workspace Pattern
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          mkdir -p source-code/cmd/picoclaw/internal/onboard/workspace
          echo "placeholder" > source-code/cmd/picoclaw/internal/onboard/workspace/placeholder.txt

      - name: Build PicoClaw (Core + Launcher)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          
          # 1. Cài đặt dependencies
          make deps
          
          # 2. Build WebUI (Frontend)
          echo "Building WebUI..."
          cd web/frontend
          pnpm install --frozen-lockfile
          pnpm run build
          mkdir -p ../../../picoclaw/webui
          cp -r dist/* ../../../picoclaw/webui/
          cd ../..
          
          # 3. Thiết lập biến môi trường build
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=0
          
          # 4. Build Core Binary
          echo "Building Core Binary for $GOOS-$GOARCH..."
          make build
          
          # 5. Build Web UI Launcher
          echo "Building WebUI Launcher..."
          make build-launcher
          
          # 6. Tự động tìm kiếm và copy binary (Sử dụng pattern có hậu tố OS-ARCH)
          echo "Locating binaries with pattern picoclaw-$GOOS-$GOARCH..."
          mkdir -p ../../picoclaw
          
          # Tìm kiếm file có pattern: picoclaw-android-arm64
          PICOCLAW_PATTERN="picoclaw-$GOOS-$GOARCH"
          LAUNCHER_PATTERN="picoclaw-launcher-$GOOS-$GOARCH"
          
          PICOCLAW_PATH=$(find . -type f -name "$PICOCLAW_PATTERN" -not -path "*/.*" -not -path "*/node_modules/*" | head -n 1)
          LAUNCHER_PATH=$(find . -type f -name "$LAUNCHER_PATTERN" -not -path "*/.*" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$PICOCLAW_PATH" ]; then
            echo "❌ ERROR: Không tìm thấy file binary theo pattern: $PICOCLAW_PATTERN"
            echo "Danh sách file thực tế trong thư mục build/ để debug:"
            find build -type f || echo "Thư mục build không tồn tại"
            exit 1
          fi
          
          echo "✅ Found core binary at: $PICOCLAW_PATH"
          cp "$PICOCLAW_PATH" ../../picoclaw/picoclaw
          
          if [ -n "$LAUNCHER_PATH" ]; then
            echo "✅ Found launcher binary at: $LAUNCHER_PATH"
            cp "$LAUNCHER_PATH" ../../picoclaw/picoclaw-launcher
          else
            echo "⚠️ Warning: Không tìm thấy launcher binary theo pattern: $LAUNCHER_PATTERN"
          fi
          
          echo "Build hoàn tất."

      - name: Commit and push to repository
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          mkdir -p picoclaw/history
          
          if [ -f "picoclaw/picoclaw" ]; then
            OLD_TAG=$(date +%Y%m%d-%H%M)
            mv picoclaw/picoclaw picoclaw/history/picoclaw-$OLD_TAG
            [ -f "picoclaw/picoclaw-launcher" ] && mv picoclaw/picoclaw-launcher picoclaw/history/picoclaw-launcher-$OLD_TAG
          fi
          
          echo "${{ steps.check_upstream.outputs.commit_hash }}" > picoclaw/last_build_commit.txt
          
          cd picoclaw/history
          ls -t picoclaw-* 2>/dev/null | tail -n +4 | xargs -I {} rm -- {}
          cd ../..
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add picoclaw/
          git commit -m "Release PicoClaw ${{ steps.check_upstream.outputs.tag_name }} [Core + WebUI + Launcher] [skip ci]" || echo "No changes to commit"
          
          git pull --rebase origin main
          git push origin main
