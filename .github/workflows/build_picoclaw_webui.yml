name: Auto Build PicoClaw Webui for Termux

on:
  schedule:
    - cron: '0 19 * * 5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check for new stable tags
        id: check_upstream
        run: |
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+.[0-9]+.[0-9]+$' | tail -n 1)
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/sipeed/picoclaw.git refs/tags/$UPSTREAM_TAG | grep -v '^{}' | awk '{print $1}')
          
          LOCAL_COMMIT=$(cat picoclaw/last_build_commit.txt 2>/dev/null || echo "")
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            echo "commit_hash=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          fi

      - name: Clone and Build
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch https://github.com/sipeed/picoclaw.git source-code
          
          # 1. Build WebUI
          cd source-code/web/frontend
          pnpm install
          pnpm run build
          mkdir -p ../../../picoclaw/webui
          cp -r dist/* ../../../picoclaw/webui/
          cd ../..
          
          # 2. Build Core
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=0
          go build -ldflags="-s -w" -o ../picoclaw_bin ./cmd/picoclaw

      - name: Commit and push
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          mkdir -p picoclaw/history
          [ -f "picoclaw/picoclaw" ] && mv picoclaw/picoclaw picoclaw/history/picoclaw-$(date +%Y%m%d)
          
          cp picoclaw_bin ./picoclaw/picoclaw
          echo "${{ steps.check_upstream.outputs.commit_hash }}" > picoclaw/last_build_commit.txt
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add picoclaw/
          git commit -m "Release ${{ steps.check_upstream.outputs.tag_name }} [Core + WebUI]" || echo "No changes"
          git push
