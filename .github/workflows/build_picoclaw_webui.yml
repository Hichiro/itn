name: Auto Build PicoClaw WebUI for Termux

on:
  schedule:
    - cron: '0 19 * * 5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new stable tags
        id: check_upstream
        run: |
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)
          [ -z "$UPSTREAM_TAG" ] && UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -vE '(alpha|beta|rc|nightly|\^)' | tail -n 1)
          
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/sipeed/picoclaw.git refs/tags/$UPSTREAM_TAG | grep -v '\^{}' | awk '{print $1}')
          
          LOCAL_COMMIT=$(cat picoclaw/last_build_commit.txt 2>/dev/null || echo "")
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
            mkdir -p picoclaw
            echo "$UPSTREAM_COMMIT" > picoclaw/last_build_commit.txt
          fi

      - name: Clone source code
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch --depth 1 \
            https://github.com/sipeed/picoclaw.git source-code

      - name: Setup Go
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: source-code/web/frontend/pnpm-lock.yaml

      - name: Setup pnpm
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Build Web UI Assets (for Launcher)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code/web/frontend || { echo "No frontend folder"; exit 0; }
          pnpm install --frozen-lockfile
          pnpm run build || echo "UI build failed, continuing..."
          mkdir -p ../../../dist_ui
          cp -r dist/* ../../../dist_ui/ 2>/dev/null || true

      - name: Build Binaries (picoclaw + picoclaw-launcher)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          
          mkdir -p workspace cmd/picoclaw/internal/onboard/workspace
          echo "static" > workspace/placeholder.txt
          echo "static" > cmd/picoclaw/internal/onboard/workspace/placeholder.txt
          
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=0
          
          echo "🔨 Building picoclaw..."
          go build -ldflags="-s -w -X main.version=${{ steps.check_upstream.outputs.tag_name }}" \
                   -o ../picoclaw_bin ./cmd/picoclaw

          echo "🔨 Building picoclaw-launcher..."
          make build-launcher OUTPUT=../picoclaw-launcher_bin 2>/dev/null || \
            go build -ldflags="-s -w" -o ../picoclaw-launcher_bin ./cmd/launcher || true

          ls -lh ../picoclaw_bin ../picoclaw-launcher_bin 2>/dev/null || true

      - name: Commit binaries
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          mkdir -p picoclaw/history

          # Backup old versions
          if [ -f "picoclaw/picoclaw" ]; then
            OLD_TAG=$(cat picoclaw/last_build_commit.txt 2>/dev/null | head -c 8 || echo "old")
            mv picoclaw/picoclaw picoclaw/history/picoclaw-$OLD_TAG 2>/dev/null || true
            mv picoclaw/picoclaw-launcher picoclaw/history/picoclaw-launcher-$OLD_TAG 2>/dev/null || true
          fi

          # Copy new binaries
          cp picoclaw_bin picoclaw/picoclaw
          [ -f "picoclaw-launcher_bin" ] && cp picoclaw-launcher_bin picoclaw/picoclaw-launcher

          chmod +x picoclaw/picoclaw picoclaw/picoclaw-launcher 2>/dev/null || true

          # Cleanup old history (keep 3 latest)
          cd picoclaw/history && ls -t picoclaw-* 2>/dev/null | tail -n +4 | xargs -I {} rm -- {} || true

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add picoclaw/
          git commit -m "Release PicoClaw + Launcher ${{ steps.check_upstream.outputs.tag_name }} for Termux [skip ci]" || echo "No changes"
          git pull --rebase origin main && git push origin main
