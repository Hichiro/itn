name: Build PicoClaw Webui Termux

on:
  schedule:
    - cron: '0 19 * * 5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for new stable tags
        id: check_upstream
        run: |
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)
          # ... (giữ nguyên logic check tag của bạn)
          echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "has_update=true" >> $GITHUB_OUTPUT

      - name: Clone PicoClaw Source
        if: steps.check_upstream.outputs.has_update == 'true'
        run: git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch https://github.com/sipeed/picoclaw.git source-code

      - name: Set up Go
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build WebUI (Launcher)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code/launcher # Điều chỉnh nếu đường dẫn khác
          npm install
          npm run build
          cp -r dist ../../picoclaw/webui

      - name: Build Binary (Core)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          export GOOS=android
          export GOARCH=arm64
          go build -ldflags="-s -w" -o ../picoclaw_bin ./cmd/picoclaw

      - name: Commit and push
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          mkdir -p picoclaw/history
          # Di chuyển bản cũ vào history
          if [ -f "picoclaw/picoclaw" ]; then
            mv picoclaw/picoclaw picoclaw/history/picoclaw-$(date +%s)
          fi
          
          cp picoclaw_bin ./picoclaw/picoclaw
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add picoclaw/
          git commit -m "Release ${{ steps.check_upstream.outputs.tag_name }} [Core + WebUI]"
          git push origin main
