name: Build PicoClaw + Launcher for Termux (Android)

on:
  schedule:
    - cron: '0 20 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-termux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check new version from upstream
        id: check_upstream
        run: |
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)
          
          if [ -z "$UPSTREAM_TAG" ]; then
            UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | tail -n 1)
          fi

          UPSTREAM_COMMIT=$(git ls-remote https://github.com/sipeed/picoclaw.git refs/tags/$UPSTREAM_TAG | awk '{print $1}')
          
          echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT

          LOCAL_COMMIT=$(cat picoclaw/last_build_commit.txt 2>/dev/null || echo "")
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Clone source code
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch --depth 1 \
            https://github.com/sipeed/picoclaw.git source-code

      - name: Setup Go
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: source-code/web/frontend/pnpm-lock.yaml

      - name: Setup pnpm
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Fix embed workspace
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          mkdir -p workspace cmd/picoclaw/internal/onboard/workspace
          echo "static" > workspace/placeholder.txt
          echo "static" > cmd/picoclaw/internal/onboard/workspace/placeholder.txt

      - name: Build PicoClaw Core + Launcher for Android arm64
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=0
          
          echo "🔨 Building core binary (picoclaw)..."
          go build -ldflags="-s -w -X main.version=${{ steps.check_upstream.outputs.tag_name }}" \
                   -o ../picoclaw_bin ./cmd/picoclaw

          echo "🔨 Building Launcher (picoclaw-launcher)..."
          # Ưu tiên dùng Makefile nếu có
          make build-launcher OUTPUT=../picoclaw-launcher_bin 2>/dev/null || \
            go build -ldflags="-s -w" -o ../picoclaw-launcher_bin ./cmd/launcher

          ls -lh ../picoclaw_bin ../picoclaw-launcher_bin || true

      - name: Commit binaries to repo
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          mkdir -p picoclaw/history

          # Core binary
          if [ -f "picoclaw/picoclaw" ]; then
            OLD_TAG=$(cat picoclaw/last_build_commit.txt 2>/dev/null | head -c 8 || echo "old")
            mv picoclaw/picoclaw picoclaw/history/picoclaw-$OLD_TAG || true
          fi
          cp picoclaw_bin picoclaw/picoclaw
          chmod +x picoclaw/picoclaw

          # Launcher binary
          if [ -f "picoclaw-launcher_bin" ]; then
            cp picoclaw-launcher_bin picoclaw/picoclaw-launcher
            chmod +x picoclaw/picoclaw-launcher
          fi

          echo "${{ steps.check_upstream.outputs.commit }}" > picoclaw/last_build_commit.txt

          # Clean old history (keep latest 3)
          cd picoclaw/history && ls -t picoclaw-* 2>/dev/null | tail -n +4 | xargs -I {} rm -- {} || true
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add picoclaw/
          git commit -m "Release PicoClaw + Launcher ${{ steps.check_upstream.outputs.tag_name }} for Termux [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
