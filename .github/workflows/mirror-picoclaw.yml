name: Mirror and Repack PicoClaw
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repackaging
        run: |
          # 1. Tạo thư mục đích
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR
          
          # 2. Lấy link bản ổn định mới nhất từ Sipeed (.deb cho mipsle)
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url')
          wget -O core.deb "$CORE_URL"
          
          # 3. Giải nén .deb để lấy binary thực thi
          ar x core.deb
          tar -xf data.tar.xz
          # Thư mục usr/bin/picoclaw sẽ xuất hiện sau khi giải nén
          
          # 4. Đóng gói binary thành file .apk đơn giản
          # Chúng ta dùng Docker Alpine để tạo cấu trúc apk nhanh
          cp usr/bin/picoclaw $REPO_DIR/
          
          # 5. Tải giao diện LuCI từ GennKann (Bản .ipk)
          LUCI_URL=$(curl -s https://api.github.com/repos/GennKann/luci-app-picoclaw/releases/latest | jq -r '.assets[] | select(.name | contains("all")) | .browser_download_url')
          wget -O $REPO_DIR/luci-app-picoclaw_all.ipk "$LUCI_URL"

          # 6. Tạo file APKINDEX (Mục lục cho Router)
          docker run --rm -v $(pwd):/dir alpine sh -c "
            cd /dir/$REPO_DIR
            apk index -o APKINDEX.tar.gz *.ipk picoclaw
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo # Tên project bạn đặt trên Cloudflare
          directory: public
