name: Mirror and Repack PicoClaw
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repackaging
        run: |
          # 1. Tạo thư mục đích
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR
          
          # 2. Lấy link bản mới nhất từ Sipeed
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url')
          wget -O core.deb "$CORE_URL"
          
          # 3. Giải nén .deb (Dùng trích xuất file thủ công để an toàn)
          ar x core.deb
          
          # 4. Kiểm tra định dạng nén của data và giải nén (Hỗ trợ xz, gz, zst)
          if [ -f data.tar.xz ]; then
            tar -xf data.tar.xz
          elif [ -f data.tar.gz ]; then
            tar -xf data.tar.gz
          elif [ -f data.tar.zst ]; then
            # Cài đặt zstd nếu chưa có và giải nén
            sudo apt-get update && sudo apt-get install -y zstd
            tar --zstd -xf data.tar.zst
          fi
          
          # 5. Đóng gói binary vào thư mục đích
          # Kiểm tra vị trí file picoclaw (thường ở usr/bin/)
          if [ -f usr/bin/picoclaw ]; then
            cp usr/bin/picoclaw $REPO_DIR/
          else
            # Tìm kiếm nếu nó nằm ở chỗ khác
            find . -name "picoclaw" -type f -exec cp {} $REPO_DIR/ \;
          fi
          
          # 6. Tải giao diện LuCI từ GennKann
          LUCI_URL=$(curl -s https://api.github.com/repos/GennKann/luci-app-picoclaw/releases/latest | jq -r '.assets[] | select(.name | contains("all")) | .browser_download_url')
          wget -O $REPO_DIR/luci-app-picoclaw_all.ipk "$LUCI_URL"

          # 7. Tạo file APKINDEX
          docker run --rm -v $(pwd):/dir alpine sh -c "
            cd /dir/$REPO_DIR
            apk index -o APKINDEX.tar.gz *.ipk picoclaw
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
