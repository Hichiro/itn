name: Build and Deploy Rolling Repo
on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v1
        with:
          arch: mipsel_74kc
          feedname: my_private_repo
          packages: picoclaw luci-app-picoclaw
        env:
          ARCH: mipsel_74kc
          FEEDNAME: my_private_repo
          PACKAGES: picoclaw luci-app-picoclaw

      - name: Organize Rolling Repo
        run: |
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR

          if [ -d "bin/packages/mipsel_74kc/" ]; then
            find bin/packages/mipsel_74kc/ -name "*.apk" -exec cp {} $REPO_DIR/ \;
          else
            echo "Lỗi: Không tìm thấy thư mục output bin/packages/"
            exit 1
          fi

          docker run --rm -v $(pwd):/dir alpine sh -c "
            apk index -o /dir/$REPO_DIR/APKINDEX.tar.gz /dir/$REPO_DIR/*.apk
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
