name: Build and Deploy Rolling Repo
on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v1
        with:
          # Thêm tham số feed để SDK biết cần lấy code từ đâu
          feed_sources: |
            src-link my_private_repo ${{ github.workspace }}/packages
        env:
          ARCH: mipsel_74kc
          PACKAGES: picoclaw luci-app-picoclaw
          V: s # Hiển thị chi tiết lỗi biên dịch nếu có

      - name: Organize Rolling Repo
        run: |
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR

          # Tìm và gom file .apk
          # Lưu ý: Thư mục chứa apk có thể khác nhau tùy bản SDK, chúng ta quét rộng hơn
          find bin/ -name "*.apk" -exec cp {} $REPO_DIR/ \;

          # Tạo APKINDEX bằng Docker
          docker run --rm -v $(pwd):/dir alpine sh -c "
            apk index -o /dir/$REPO_DIR/APKINDEX.tar.gz /dir/$REPO_DIR/*.apk
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
