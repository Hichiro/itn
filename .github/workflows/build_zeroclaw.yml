name: Auto Build ZeroClaw for Termux

on:
  #schedule:
  #  - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Check for new stable tags from upstream
        id: check_upstream
        run: |
          # 1. Lấy tag mới nhất có cấu trúc số phiên bản (loại bỏ các tag chứa chữ beta, alpha, rc)
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/zeroclaw-labs/zeroclaw.git | awk -F'/' '{print $3}' | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)
          
          # Nếu không tìm thấy tag chuẩn, fallback về lấy commit của tag mới nhất bất kỳ
          if [ -z "$UPSTREAM_TAG" ]; then
            UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/zeroclaw-labs/zeroclaw.git | awk -F'/' '{print $3}' | tail -n 1)
          fi
          
          # 2. Lấy mã commit của Tag Stable đó
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/zeroclaw-labs/zeroclaw.git refs/tags/$UPSTREAM_TAG | awk '{print $1}')
          echo "Latest Stable Tag: $UPSTREAM_TAG"
          echo "Upstream commit for tag: $UPSTREAM_COMMIT"
          
          LOCAL_COMMIT=$(cat zeroclaw/last_build_commit.txt 2>/dev/null || echo "")
          echo "Local last build commit: $LOCAL_COMMIT"
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "No new updates. Skipping build."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "New stable update found!"
            mkdir -p zeroclaw
            echo "$UPSTREAM_COMMIT" > zeroclaw/last_build_commit.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Clone ZeroClaw Source (At Stable Tag)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          # Chỉ clone duy nhất mã nguồn tại thẻ Stable vừa quét được
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch https://github.com/zeroclaw-labs/zeroclaw.git source-code

      - name: Get ZeroClaw Version
        if: steps.check_upstream.outputs.has_update == 'true'
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version' source-code/Cargo.toml | cut -d '"' -f 2)
          echo "Detected Version: v$VERSION"
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Rust toolchain
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          echo "NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build Binary Native for Termux
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          NDK_TOOLCHAIN=${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          export CC=${NDK_TOOLCHAIN}/aarch64-linux-android24-clang
          export AR=${NDK_TOOLCHAIN}/llvm-ar
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_TOOLCHAIN}/aarch64-linux-android24-clang
          
          cargo build --release --target aarch64-linux-android

      - name: Commit and push files to repository
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cp source-code/target/aarch64-linux-android/release/zeroclaw ./zeroclaw/zeroclaw
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add zeroclaw/last_build_commit.txt zeroclaw/zeroclaw
          
          git commit -m "Release ${{ steps.get_version.outputs.version }} [skip ci]" || echo "No changes"
          
          git pull --rebase origin main
          git push origin main
