name: Auto Build ZeroClaw for Termux

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Check for new commits from upstream
        id: check_upstream
        run: |
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/zeroclaw-labs/zeroclaw.git HEAD | awk '{print $1}')
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          # Đổi đường dẫn đọc file tracking từ thư mục zeroclaw/
          LOCAL_COMMIT=$(cat zeroclaw/last_build_commit.txt 2>/dev/null || echo "")
          echo "Local last build commit: $LOCAL_COMMIT"
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "No new updates. Skipping build."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "New update found!"
            # Tạo thư mục zeroclaw nếu chưa có và ghi đè commit mới vào
            mkdir -p zeroclaw
            echo "$UPSTREAM_COMMIT" > zeroclaw/last_build_commit.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Clone ZeroClaw Source
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone https://github.com/zeroclaw-labs/zeroclaw.git source-code

      - name: Setup Rust toolchain
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          echo "NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build Binary Native for Termux
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          NDK_TOOLCHAIN=${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          export CC=${NDK_TOOLCHAIN}/aarch64-linux-android24-clang
          export AR=${NDK_TOOLCHAIN}/llvm-ar
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_TOOLCHAIN}/aarch64-linux-android24-clang
          
          cargo build --release --target aarch64-linux-android

      # Copy và đẩy cả 2 file vào trong thư mục zeroclaw/
      - name: Commit and push files to repository
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          # Copy file binary vào chung thư mục zeroclaw/
          cp source-code/target/aarch64-linux-android/release/zeroclaw ./zeroclaw/zeroclaw
          
          # Cấu hình bot và push toàn bộ thư mục zeroclaw lên GitHub
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zeroclaw/last_build_commit.txt zeroclaw/zeroclaw
          git commit -m "Update binary and tracking in zeroclaw/ [skip ci]" || echo "No changes"
          git push
