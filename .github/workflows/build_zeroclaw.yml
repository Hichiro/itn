name: Auto Build ZeroClaw for Termux

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Khai báo quyền Ghi trực tiếp trong workflow để tăng tính bảo mật
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Tắt cảnh báo lỗi Node.js 20 cập nhật sang Node 24

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new commits from upstream
        id: check_upstream
        run: |
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/zeroclaw-labs/zeroclaw.git HEAD | awk '{print $1}')
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          LOCAL_COMMIT=$(cat last_build_commit.txt 2>/dev/null || echo "")
          echo "Local last build commit: $LOCAL_COMMIT"
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "No new updates. Skipping build."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "New update found!"
            echo "$UPSTREAM_COMMIT" > last_build_commit.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push tracking file
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_build_commit.txt
          git commit -m "Update last built commit tracking [skip ci]" || echo "No changes"
          git push

      - name: Clone ZeroClaw Source
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone https://github.com/zeroclaw-labs/zeroclaw.git source-code

      - name: Setup Rust toolchain
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          echo "NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build Binary Native for Termux
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          cargo build --release --target aarch64-linux-android

      - name: Upload Binary Artifact
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-termux
          path: source-code/target/aarch64-linux-android/release/zeroclaw
