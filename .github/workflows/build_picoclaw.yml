name: Auto Build PicoClaw for Termux (Stable Only)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Check for new stable tags from upstream
        id: check_upstream
        run: |
          # Chuẩn hóa cách lấy Tag: Lấy danh sách tag sạch, loại bỏ các chuỗi chứa chữ alpha, beta, rc, nightly
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)
          
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Khong tim thay tag stable hop le. Thu dung cach quét tag thuong..."
            UPSTREAM_TAG=$(git ls-remote --tags https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -vE '(alpha|beta|rc|nightly|\^)' | tail -n 1)
          fi
          
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Loi: Khong the xac dinh duoc Tag tu kho goc sipeed/picoclaw."
            exit 1
          fi
          
          # Lấy mã commit chính xác của Tag đó (Sửa lỗi lấy nhầm mã hash dạng ^{})
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/sipeed/picoclaw.git refs/tags/$UPSTREAM_TAG | awk '{print $1}')
          
          echo "Latest Stable Tag Detected: $UPSTREAM_TAG"
          echo "Upstream commit for tag: $UPSTREAM_COMMIT"
          
          LOCAL_COMMIT=$(cat picoclaw/last_build_commit.txt 2>/dev/null || echo "")
          echo "Local last build commit: $LOCAL_COMMIT"
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "No new updates. Skipping build."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "New stable update found!"
            mkdir -p picoclaw
            echo "$UPSTREAM_COMMIT" > picoclaw/last_build_commit.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Clone PicoClaw Source (At Stable Tag)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          # Tiến hành clone branch đích danh theo Tag sạch vừa tìm được
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch https://github.com/sipeed/picoclaw.git source-code
          
          # Kiểm tra nhanh sự tồn tại của file Cargo.toml để tránh lỗi cạn thư mục
          if [ ! -f "source-code/Cargo.toml" ]; then
            echo "Loi: Van khong tim thay Cargo.toml sau khi clone. Liet ke thu muc:"
            ls -la source-code
            exit 1
          fi

      - name: Get PicoClaw Version from Cargo
        if: steps.check_upstream.outputs.has_update == 'true'
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version' source-code/Cargo.toml | cut -d '"' -f 2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Rust toolchain
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          echo "NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      - name: Build Binary Native for Termux
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          NDK_TOOLCHAIN=${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          export CC=${NDK_TOOLCHAIN}/aarch64-linux-android24-clang
          export AR=${NDK_TOOLCHAIN}/llvm-ar
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_TOOLCHAIN}/aarch64-linux-android24-clang
          
          cargo build --release --target aarch64-linux-android

      - name: Commit and push binary to repository
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cp source-code/target/aarch64-linux-android/release/picoclaw ./picoclaw/picoclaw
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add picoclaw/last_build_commit.txt picoclaw/picoclaw
          git commit -m "Release PicoClaw ${{ steps.get_version.outputs.version }} [skip ci]" || echo "No changes"
          
          git pull --rebase origin main
          git push origin main
