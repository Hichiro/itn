name: Auto Build PicoClaw for Termux

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Check for new stable tags from upstream
        id: check_upstream
        run: |
          # Quét tag sạch từ kho sipeed/picoclaw, loại bỏ alpha, beta, rc, nightly
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -E '^[vV]?[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)
          
          if [ -z "$UPSTREAM_TAG" ]; then
            UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -vE '(alpha|beta|rc|nightly|\^)' | tail -n 1)
          fi
          
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Loi: Khong xac dinh duoc Tag tu sipeed/picoclaw."
            exit 1
          fi
          
          # Lấy duy nhất 1 dòng commit chính xác của tag (loại bỏ dòng ^{})
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/sipeed/picoclaw.git refs/tags/$UPSTREAM_TAG | grep -v '\^{}' | awk '{print $1}')
          
          echo "Latest Stable Tag: $UPSTREAM_TAG"
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          LOCAL_COMMIT=$(cat picoclaw/last_build_commit.txt 2>/dev/null || echo "")
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "No new updates. Skipping build."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "New stable update found!"
            mkdir -p picoclaw
            echo "$UPSTREAM_COMMIT" > picoclaw/last_build_commit.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Clone PicoClaw Source
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch https://github.com/sipeed/picoclaw.git source-code

      - name: Set up Go
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Sử dụng phiên bản Go ổn định phù hợp với go.mod

      - name: Build Binary Native for Termux (Go Cross-Compile)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          
          # Kích hoạt chế độ biên dịch chéo sang môi trường Android ARM64
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=0 # Tắt CGO để file chạy hoàn toàn độc lập, không bị phụ thuộc thư viện động
          
          # Tiến hành biên dịch tệp thực thi từ thư mục cmd chính (thường nằm trong cmd/picoclaw hoặc main.go gốc)
          # Lệnh này sẽ tự động tìm hàm main và build ra file binary tên là picoclaw
          if [ -d "cmd/picoclaw" ]; then
            go build -ldflags="-s -w" -o ../picoclaw_bin ./cmd/picoclaw
          else
            go build -ldflags="-s -w" -o ../picoclaw_bin ./cmd/main.go || go build -ldflags="-s -w" -o ../picoclaw_bin .
          fi

      - name: Commit and push binary to repository
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          # Đưa file binary sạch vào đúng thư mục đích của bạn
          cp picoclaw_bin ./picoclaw/picoclaw
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add picoclaw/last_build_commit.txt picoclaw/picoclaw
          git commit -m "Release PicoClaw ${{ steps.check_upstream.outputs.tag_name }} [skip ci]" || echo "No changes"
          
          git pull --rebase origin main
          git push origin main
