name: Auto Build PicoClaw for Termux

on:
  schedule:
    # Chạy vào lúc 00:00 ngày Thứ 7 hàng tuần (6 = Saturday)
    - cron: '0 0 * * 6'
  workflow_dispatch:

env:
  # Ép buộc các Action chạy trên Node.js 24 để tránh cảnh báo lỗi hệ thống
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Check for new stable tags from upstream
        id: check_upstream
        run: |
          # Loại bỏ triệt để các tag thử nghiệm (alpha, beta, rc, dev, nightly)
          # Chỉ giữ lại tag có cấu trúc thuần số ổn định và lấy bản cao nhất ở cuối dòng (tail -n 1)
          UPSTREAM_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/sipeed/picoclaw.git | awk -F'/' '{print $3}' | grep -vE '(alpha|beta|rc|dev|nightly|\^)' | tail -n 1)
          
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Loi: Khong xac dinh duoc Tag stable tu sipeed/picoclaw."
            exit 1
          fi
          
          UPSTREAM_COMMIT=$(git ls-remote https://github.com/sipeed/picoclaw.git refs/tags/$UPSTREAM_TAG | grep -v '\^{}' | awk '{print $1}')
          
          echo "Latest Stable Tag: $UPSTREAM_TAG"
          echo "Upstream commit: $UPSTREAM_COMMIT"
          
          LOCAL_COMMIT=$(cat picoclaw/last_build_commit.txt 2>/dev/null || echo "")
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "No new updates. Skipping build."
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "New stable update found!"
            mkdir -p picoclaw
            echo "$UPSTREAM_COMMIT" > picoclaw/last_build_commit.txt
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "tag_name=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Clone PicoClaw Source
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          git clone --branch ${{ steps.check_upstream.outputs.tag_name }} --single-branch https://github.com/sipeed/picoclaw.git source-code

      - name: Set up Go
        if: steps.check_upstream.outputs.has_update == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: source-code/go.sum

      - name: Fix Missing Embed Workspace Pattern
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          mkdir -p workspace
          mkdir -p cmd/picoclaw/internal/onboard/workspace
          
          echo "static" > workspace/placeholder.txt
          echo "static" > cmd/picoclaw/internal/onboard/workspace/placeholder.txt
          echo "Da khoi tao file giap lap hop le de danh lua Go Embed."

      - name: Build Binary Native for Termux (Go Cross-Compile)
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          cd source-code
          
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=0
          
          if [ -d "cmd/picoclaw" ]; then
            go build -ldflags="-s -w" -o ../picoclaw_bin ./cmd/picoclaw
          else
            go build -ldflags="-s -w" -o ../picoclaw_bin ./cmd/main.go || go build -ldflags="-s -w" -o ../picoclaw_bin .
          fi

      - name: Commit and push binary to repository
        if: steps.check_upstream.outputs.has_update == 'true'
        run: |
          mkdir -p picoclaw/history
          
          if [ -f "picoclaw/picoclaw" ]; then
            OLD_TAG=$(git log -1 --format=%s | grep -oE '[vV]?[0-9]+\.[0-9]+\.[0-9]+' || echo "${{ steps.check_upstream.outputs.tag_name }}")
            mv picoclaw/picoclaw picoclaw/history/picoclaw-$OLD_TAG
            echo "Da chuyen ban build cu sang picoclaw/history/picoclaw-$OLD_TAG"
          fi
          
          cp picoclaw_bin ./picoclaw/picoclaw
          
          cd picoclaw/history
          ls -t picoclaw-* 2>/dev/null | tail -n +4 | xargs -I {} rm -- {}
          cd ../..
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add picoclaw/
          
          git commit -m "Release PicoClaw ${{ steps.check_upstream.outputs.tag_name }} for Termux [skip ci]" || echo "No changes"
          
          git pull --rebase origin main
          git push origin main
