name: 2. Deploy Rolling Repo
on:
  workflow_run:
    workflows: ["1. Build PicoClaw Core"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Core Artifact
        uses: actions/download-artifact@v4
        with:
          name: core-apk
          path: public/mipsel_74kc/packages

      - name: Download Latest LuCI from GennKann
        run: |
          mkdir -p public/mipsel_74kc/packages
          # Tải bản .ipk hoặc .apk mới nhất từ Release của GennKann
          LATEST_URL=$(curl -s https://api.github.com/repos/GennKann/luci-app-picoclaw/releases/latest | jq -r '.assets[] | select(.name | contains("all")) | .browser_download_url')
          wget -O public/mipsel_74kc/packages/luci-app-picoclaw_latest.ipk "$LATEST_URL"

      - name: Generate Index
        run: |
          cd public/mipsel_74kc/packages
          # Tạo mục lục cho cả file .apk và .ipk
          docker run --rm -v $(pwd):/dir alpine sh -c "apk index -o /dir/APKINDEX.tar.gz /dir/*.apk /dir/*.ipk"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
