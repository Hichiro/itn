name: Repack PicoClaw Core
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repackaging Binary to APK
        run: |
          # 1. Tạo thư mục làm việc chuẩn
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR
          mkdir -p pkg_root/usr/bin
          
          # 2. Xử lý file .deb bạn đã cung cấp
          # Lưu ý: Nếu bạn chạy trên GitHub, script sẽ lấy từ Release 
          # Hoặc bạn có thể sửa lệnh này để lấy file local nếu bạn đẩy file .deb lên repo
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url' | head -n 1)
          wget -O core.deb "$CORE_URL"
          
          # Giải nén .deb (Lấy data.tar.gz)
          ar x core.deb
          
          # Giải nén data.tar.gz để lấy binary
          tar -xzf data.tar.gz
          
          # 3. Chép binary vào cấu trúc gói mới và cấp quyền thực thi
          # File từ .deb nằm ở usr/bin/picoclaw
          cp usr/bin/picoclaw pkg_root/usr/bin/picoclaw
          chmod +x pkg_root/usr/bin/picoclaw

          # 4. Đóng gói chuẩn OpenWrt (apk v2 format)
          cd pkg_root
          
          # Tạo PKGINFO đúng định dạng (dùng dấu =)
          echo "pkgname = picoclaw" > .PKGINFO
          echo "pkgver = 1.0.0-r1" >> .PKGINFO
          echo "arch = mipsel_74kc" >> .PKGINFO
          echo "size = $(du -sb usr | cut -f1)" >> .PKGINFO
          echo "pkgdesc = PicoClaw AI Core for Newifi 3" >> .PKGINFO
          
          # Nén phần Data
          tar -czf ../data_new.tar.gz usr/
          
          # Nén phần Control (.PKGINFO phải nằm ở gốc của tarball này)
          tar -czf ../control_new.tar.gz .PKGINFO
          
          cd ..
          
          # Gộp thành file .apk chuẩn
          cat control_new.tar.gz data_new.tar.gz > $REPO_DIR/picoclaw.apk

          # 5. Tạo Index dùng Docker Alpine (Bỏ qua check chữ ký)
          docker run --rm -v $(pwd):/dir alpine sh -c "
            cd /dir/$REPO_DIR
            apk index --allow-untrusted -o APKINDEX.tar.gz picoclaw.apk
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
