name: Repack PicoClaw Core
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repackaging Binary to APK
        run: |
          # 1. Tạo thư mục làm việc
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR
          mkdir -p pkg_root/usr/bin
          
          # 2. Tải và giải nén .deb từ Sipeed
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url' | head -n 1)
          wget -O core.deb "$CORE_URL"
          ar x core.deb
          
          sudo apt-get update && sudo apt-get install -y zstd
          if [ -f data.tar.zst ]; then tar --zstd -xf data.tar.zst;
          elif [ -f data.tar.xz ]; then tar -xf data.tar.xz;
          else tar -xf data.tar.gz; fi
          
          # 3. Lấy binary và cấp quyền
          find . -name "picoclaw" -type f -exec cp {} pkg_root/usr/bin/picoclaw \;
          chmod +x pkg_root/usr/bin/picoclaw

          # 4. Tạo các thành phần của APK (Thực hiện trực tiếp trên Ubuntu)
          # Tạo nội dung mô tả gói
          cd pkg_root
          echo -e "pkgname = picoclaw\npkgver = 1.0.0-r1\narch = mipsel_74kc\nsize = $(du -sb usr | cut -f1)\npkgdesc = PicoClaw AI Core" > .PKGINFO
          
          # Đóng gói phần dữ liệu (Data)
          tar -czf ../data.tar.gz usr/
          
          # Đóng gói phần thông tin (Control/Metadata)
          tar -czf ../control.tar.gz .PKGINFO
          cd ..

          # Gộp lại thành file .apk chuẩn
          cat control.tar.gz data.tar.gz > $REPO_DIR/picoclaw.apk

          # 5. Dùng Docker Alpine CHỈ để tạo Index (Bỏ qua kiểm tra chữ ký)
          docker run --rm -v $(pwd):/dir alpine sh -c "
            cd /dir/$REPO_DIR
            apk index --allow-untrusted -o APKINDEX.tar.gz picoclaw.apk
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
