name: Repack PicoClaw Core
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repackaging Binary to APK
        run: |
          # 1. Tạo cấu trúc thư mục
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR
          mkdir -p pkg_root/usr/bin
          
          # 2. Tải và xử lý file .deb
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url' | head -n 1)
          wget -O core.deb "$CORE_URL"
          ar x core.deb
          tar -xzf data.tar.gz
          
          # 3. Chuẩn bị file thực thi
          cp usr/bin/picoclaw pkg_root/usr/bin/picoclaw
          chmod +x pkg_root/usr/bin/picoclaw

          # 4. Tạo gói APK chuẩn (Single-Stream format)
          cd pkg_root
          # Tạo nội dung PKGINFO chuẩn Alpine
          echo "pkgname = picoclaw" > .PKGINFO
          echo "pkgver = 1.0.0-r1" >> .PKGINFO
          echo "arch = mipsel_74kc" >> .PKGINFO
          echo "size = $(du -sb usr | cut -f1)" >> .PKGINFO
          echo "pkgdesc = PicoClaw AI Core" >> .PKGINFO
          
          # Đóng gói TẤT CẢ vào một file tar.gz duy nhất
          # Quan trọng: .PKGINFO phải đứng đầu danh sách file trong tarball
          tar -czf ../picoclaw.apk .PKGINFO usr/
          cd ..
          
          mv picoclaw.apk $REPO_DIR/

          # 5. Tạo Index bằng Docker
          docker run --rm -v $(pwd):/dir alpine sh -c "
            cd /dir/$REPO_DIR
            apk index --allow-untrusted -o APKINDEX.tar.gz picoclaw.apk
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
