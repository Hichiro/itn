name: Repack PicoClaw Core
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Repo with Binary Only
        run: |
          # 1. Tạo thư mục Repo
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR
          
          # 2. Tải và lấy binary từ Sipeed
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url' | head -n 1)
          wget -O core.deb "$CORE_URL"
          ar x core.deb
          tar -xzf data.tar.gz
          
          # 3. Đưa binary vào Repo và đặt tên theo chuẩn OpenWrt
          # Chúng ta đặt tên file là 'picoclaw' (không đuôi .apk)
          cp usr/bin/picoclaw $REPO_DIR/picoclaw
          chmod +x $REPO_DIR/picoclaw

          # 4. TẠO INDEX THỦ CÔNG (Không dùng lệnh apk index của Docker nữa)
          # OpenWrt có thể nhận diện file binary nếu có mô tả đúng trong APKINDEX
          cd $REPO_DIR
          
          # Tạo file mô tả đơn giản nhất
          echo "P:picoclaw" > metadata
          echo "V:1.0.0-1" >> metadata
          echo "A:mipsel_74kc" >> metadata
          echo "S:$(stat -c%s picoclaw)" >> metadata
          echo "D:PicoClaw AI Core" >> metadata
          echo "" >> metadata
          
          # Nén thành APKINDEX chuẩn
          tar -czf APKINDEX.tar.gz metadata
          rm metadata

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: itn
          directory: public
