name: Repack PicoClaw Core
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Repo Structure
        run: |
          # 1. Tạo thư mục Repo ngay tại thư mục gốc của Runner
          mkdir -p public/mipsel_74kc/packages
          
          # 2. Tải và lấy binary từ Sipeed
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url' | head -n 1)
          wget -O core.deb "$CORE_URL"
          ar x core.deb
          tar -xzf data.tar.gz
          
          # 3. Đưa binary vào đường dẫn chuẩn
          cp usr/bin/picoclaw public/mipsel_74kc/packages/picoclaw
          chmod +x public/mipsel_74kc/packages/picoclaw

          # 4. Tạo file Index thủ công cho Repo
          # Đảm bảo đứng ở thư mục gốc để thực hiện
          echo "P:picoclaw" > metadata
          echo "V:1.0.0-1" >> metadata
          echo "A:mipsel_74kc" >> metadata
          echo "S:$(stat -c%s public/mipsel_74kc/packages/picoclaw)" >> metadata
          echo "D:PicoClaw AI Core" >> metadata
          echo "" >> metadata
          
          tar -czf public/mipsel_74kc/packages/APKINDEX.tar.gz metadata
          rm metadata

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: itn # Đảm bảo tên này khớp với Cloudflare
          directory: public # Action sẽ tìm thư mục 'public' ở gốc Repo
