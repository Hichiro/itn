name: Repack PicoClaw Core
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  repack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repackaging Binary to APK
        run: |
          # 1. Tạo thư mục làm việc
          REPO_DIR="public/mipsel_74kc/packages"
          mkdir -p $REPO_DIR
          mkdir -p pkg_root/usr/bin
          
          # 2. Tải và giải nén .deb từ Sipeed
          CORE_URL=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.assets[] | select(.name | endswith("mipsle.deb")) | .browser_download_url' | head -n 1)
          wget -O core.deb "$CORE_URL"
          ar x core.deb
          
          sudo apt-get update && sudo apt-get install -y zstd
          if [ -f data.tar.zst ]; then tar --zstd -xf data.tar.zst;
          elif [ -f data.tar.xz ]; then tar -xf data.tar.xz;
          else tar -xf data.tar.gz; fi
          
          # 3. Lấy binary và cấp quyền
          find . -name "picoclaw" -type f -exec cp {} pkg_root/usr/bin/picoclaw \;
          chmod +x pkg_root/usr/bin/picoclaw

          # 4. Đóng gói bằng công cụ chuyên dụng của Alpine
          docker run --rm -v $(pwd):/dir alpine sh -c "
            apk add --no-cache abuild tar
            cd /dir/pkg_root
            
            # Tạo file .PKGINFO chuẩn (phải có định dạng cụ thể)
            echo 'pkgname = picoclaw' > .PKGINFO
            echo 'pkgver = 1.0.0-r1' >> .PKGINFO
            echo 'arch = mipsel_74kc' >> .PKGINFO
            echo 'size = 17281218' >> .PKGINFO
            echo 'pkgdesc = PicoClaw AI Core' >> .PKGINFO
            
            # Đóng gói theo chuẩn Alpine (phải nén từng phần)
            # Tạo tệp nén cho metadata và dữ liệu riêng biệt
            tar -ztf /dir/pkg_root | tar -zc -f /dir/data.tar.gz -T -
            tar -zc -f /dir/control.tar.gz .PKGINFO
            
            # Gộp lại thành file .apk chuẩn mà apk index có thể đọc
            cat /dir/control.tar.gz /dir/data.tar.gz > /dir/$REPO_DIR/picoclaw.apk
            
            # Tạo Index với tham số bỏ qua chữ ký
            cd /dir/$REPO_DIR
            apk index --allow-untrusted -o APKINDEX.tar.gz picoclaw.apk
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: my-picoclaw-repo
          directory: public
